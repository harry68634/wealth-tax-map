<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>European Wealth Tax Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
}

h2{
text-align:center;
margin-top:15px;
}

p{
text-align:center;
max-width:800px;
margin:auto;
margin-bottom:10px;
}

#map{
height:650px;
width:100%;
}

/* info panel */

.info{
padding:10px;
background:white;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:5px;
font-size:14px;
}

.legend{
background:white;
padding:10px;
line-height:1.5em;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:5px;
font-size:14px;
}

.legend i{
width:15px;
height:15px;
float:left;
margin-right:8px;
opacity:0.8;
}

</style>

</head>

<body>

<h2>Wealth Taxes in Europe</h2>

<p>
Hover over a country to see information about whether it currently has,
previously had, or never had a net wealth tax.
</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

var geojson;

// create map
var map = L.map('map', {
minZoom:3,
maxZoom:7
}).setView([54,15],4);

// restrict bounds
map.setMaxBounds([
[30,-25],
[75,45]
]);

// base map
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);


// colour function

function getColor(status){

if(status=="current") return "#b2182b";
if(status=="former") return "#ef8a62";

return "#e0e0e0";

}


// style countries

function style(feature){

var name = feature.properties.NAME || feature.properties.name;

var data = wealthTaxData[name];

var status = data ? data.status : "none";

return{

fillColor:getColor(status),
weight:1,
color:"white",
fillOpacity:0.7

};

}


// info box

var info = L.control();

info.onAdd = function(){

this._div = L.DomUtil.create('div','info');

this.update();

return this._div;

};

info.update = function(data,name){

if(data){

this._div.innerHTML =
"<b>"+name+"</b><br>"+
"Status: "+data.status+"<br>"+
"Start: "+data.start+"<br>"+
"End: "+(data.end || "Present")+
"<br>"+(data.notes || "");

}

else if(name){

this._div.innerHTML =
"<b>"+name+"</b><br>No wealth tax";

}

else{

this._div.innerHTML =
"<b>Hover over a country</b>";

}

};

info.addTo(map);


// highlight

function highlightFeature(e){

var layer = e.target;

var name = layer.feature.properties.NAME || layer.feature.properties.name;

var data = wealthTaxData[name];

layer.setStyle({
weight:3,
color:"#444",
fillOpacity:0.9
});

info.update(data,name);

}


// reset

function resetHighlight(e){

geojson.resetStyle(e.target);

info.update();

}


// interaction

function onEachFeature(feature,layer){

var name = feature.properties.NAME || feature.properties.name;

layer.on({
mouseover: highlightFeature,
mouseout: resetHighlight
});

layer.bindTooltip(name);

}


// load map

fetch("./europe.geojson")

.then(res => res.json())

.then(function(data){

geojson = L.geoJson(data,{
style:style,
onEachFeature:onEachFeature
}).addTo(map);

});


// legend

var legend = L.control({position:"bottomright"});

legend.onAdd = function(){

var div = L.DomUtil.create("div","legend");

div.innerHTML =
"<b>Wealth Tax Status</b><br>"+
"<i style='background:#b2182b'></i> Current<br>"+
"<i style='background:#ef8a62'></i> Former<br>"+
"<i style='background:#e0e0e0'></i> None";

return div;

};

legend.addTo(map);

</script>

</body>
</html>
