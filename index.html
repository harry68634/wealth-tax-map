<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>European Wealth Tax Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
}

h2{
text-align:center;
margin-top:15px;
}

p{
text-align:center;
max-width:800px;
margin:auto;
margin-bottom:10px;
}

#map{
height:650px;
width:100%;
}

.info{
padding:10px;
background:white;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:5px;
font-size:14px;
}

.legend{
background:white;
padding:10px;
line-height:1.5em;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:5px;
font-size:14px;
}

.legend i{
width:15px;
height:15px;
float:left;
margin-right:8px;
opacity:0.8;
}

.sliderBox{
text-align:center;
margin:10px;
}

</style>

</head>

<body>

<h2>Wealth Taxes in Europe</h2>

<p>
Move the timeline slider to see which countries had wealth taxes in a given year.
Hover over a country to see detailed information.
</p>

<div class="sliderBox">

<label><b>Year:</b></label>

<input
type="range"
id="yearSlider"
min="1900"
max="2025"
value="2025"
step="1"
style="width:300px"
>

<span id="yearLabel">2025</span>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

var geojson;
var currentYear = 2025;

var map = L.map('map',{
minZoom:3,
maxZoom:7
}).setView([54,15],4);

map.setMaxBounds([
[30,-25],
[75,45]
]);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);


/* colour logic */

function getColor(data){

if(!data) return "#e0e0e0";

if(data.start <= currentYear &&
(!data.end || data.end >= currentYear)){
return "#b2182b";
}

if(data.end && data.end < currentYear){
return "#ef8a62";
}

return "#e0e0e0";

}


/* style */

function style(feature){

var name = feature.properties.NAME || feature.properties.name;

var data = wealthTaxData[name];

return{

fillColor:getColor(data),
weight:1,
color:"white",
fillOpacity:0.7

};

}


/* info panel */

var info = L.control();

info.onAdd = function(){

this._div = L.DomUtil.create('div','info');

this.update();

return this._div;

};

info.update = function(data,name){

if(data){

this._div.innerHTML =
"<b>"+name+"</b><br>" +
"Status: "+data.status+"<br>" +
"Years: "+data.start+" – "+(data.end || "Present")+"<br>" +
"Rate: "+(data.rate || "N/A")+"<br>" +
"Threshold: "+(data.threshold || "N/A")+"<br>" +
"Revenue: "+(data.revenue || "N/A")+"<br>" +
(data.notes ? "<i>"+data.notes+"</i>" : "");

}

else if(name){

this._div.innerHTML =
"<b>"+name+"</b><br>No wealth tax";

}

else{

this._div.innerHTML =
"<b>Hover over a country</b>";

}

};

info.addTo(map);


/* hover effects */

function highlightFeature(e){

var layer = e.target;

var name = layer.feature.properties.NAME || layer.feature.properties.name;

var data = wealthTaxData[name];

layer.setStyle({
weight:3,
color:"#444",
fillOpacity:0.9
});

info.update(data,name);

}

function resetHighlight(e){

geojson.resetStyle(e.target);

info.update();

}


/* interactions */

function onEachFeature(feature,layer){

var name = feature.properties.NAME || feature.properties.name;

layer.on({
mouseover: highlightFeature,
mouseout: resetHighlight
});

layer.bindTooltip(name);

}


/* load geojson */

fetch("./europe.geojson")

.then(res => res.json())

.then(function(data){

geojson = L.geoJson(data,{
style:style,
onEachFeature:onEachFeature
}).addTo(map);

});


/* legend */

var legend = L.control({position:"bottomright"});

legend.onAdd = function(){

var div = L.DomUtil.create("div","legend");

div.innerHTML =
"<b>Wealth Tax Status</b><br>"+
"<i style='background:#b2182b'></i> Current<br>"+
"<i style='background:#ef8a62'></i> Former<br>"+
"<i style='background:#e0e0e0'></i> None";

return div;

};

legend.addTo(map);


/* timeline slider */

document
.getElementById("yearSlider")
.addEventListener("input",function(){

currentYear = this.value;

document.getElementById("yearLabel").innerText = currentYear;

geojson.setStyle(style);

});

</script>

</body>
</html>
