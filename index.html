<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>European Wealth Tax Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
}

h2{
text-align:center;
margin:10px;
}

#map{
height:650px;
width:100%;
}

.legend{
background:white;
padding:10px;
line-height:1.5em;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

.legend i{
width:15px;
height:15px;
float:left;
margin-right:8px;
opacity:0.7;
}

</style>

</head>

<body>

<h2>Wealth Taxes in Europe</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

// create map centered on Europe
var map = L.map('map').setView([54,15],4);

// base map
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom: 6
}
).addTo(map);


// colour logic
function getColor(status){

if(status=="current") return "#d73027";
if(status=="former") return "#fee08b";

return "#dddddd";

}


// style countries
function style(feature){

var name = feature.properties.name;

var data = wealthTaxData[name];

var status = data ? data.status : "none";

return{

fillColor:getColor(status),
weight:1,
opacity:1,
color:"white",
fillOpacity:0.7

};

}


// popup info
function onEachFeature(feature,layer){

var name = feature.properties.name;

var data = wealthTaxData[name];

var popupContent;

if(data){

popupContent =
"<b>"+name+"</b><br>"+
"Status: "+data.status+"<br>"+
"Start: "+data.start+"<br>"+
"End: "+(data.end || "Present")+
"<br>"+(data.notes || "");

}

else{

popupContent =
"<b>"+name+"</b><br>No wealth tax";

}

layer.bindPopup(popupContent);

}


// load Europe GeoJSON
fetch("./europe.geojson")

.then(res => res.json())

.then(function(data){

L.geoJson(data,{

style:style,
onEachFeature:onEachFeature

}).addTo(map);
