<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>European Wealth Tax Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
}

h2{
text-align:center;
margin-top:15px;
}

p{
text-align:center;
max-width:800px;
margin:auto;
margin-bottom:10px;
}

#map{
height:650px;
width:100%;
}

.legend{
background:white;
padding:10px;
line-height:1.5em;
box-shadow:0 0 6px rgba(0,0,0,0.3);
border-radius:5px;
font-size:14px;
}

.legend i{
width:15px;
height:15px;
float:left;
margin-right:8px;
opacity:0.8;
}

</style>

</head>

<body>

<h2>Wealth Taxes in Europe</h2>

<p>
This interactive map shows European countries that currently have or previously
had a net wealth tax. Hover over a country to see its name and click it to see
information about when the tax was introduced or abolished.
</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>

var geojson;

// Create map centered on Europe with zoom limits
var map = L.map('map', {
minZoom:3,
maxZoom:7
}).setView([54,15],4);

// Restrict map bounds to Europe
map.setMaxBounds([
[30,-25],
[75,45]
]);

// Base map layer
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:7
}
).addTo(map);


// Colour function
function getColor(status){

if(status=="current") return "#b2182b";
if(status=="former") return "#ef8a62";

return "#e0e0e0";

}


// Country style
function style(feature){

var name = feature.properties.NAME || feature.properties.name;

var data = wealthTaxData[name];

var status = data ? data.status : "none";

return{

fillColor:getColor(status),
weight:1,
opacity:1,
color:"white",
fillOpacity:0.7

};

}


// Highlight on hover
function highlightFeature(e){

var layer = e.target;

layer.setStyle({
weight:3,
color:"#444",
fillOpacity:0.9
});

}


// Reset highlight
function resetHighlight(e){
geojson.resetStyle(e.target);
}


// Country interaction
function onEachFeature(feature,layer){

var name = feature.properties.NAME || feature.properties.name;

var data = wealthTaxData[name];

layer.on({
mouseover: highlightFeature,
mouseout: resetHighlight
});

layer.bindTooltip(name);

var popupContent;

if(data){

popupContent =
"<b>"+name+"</b><br>"+
"Status: "+data.status+"<br>"+
"Start: "+data.start+"<br>"+
"End: "+(data.end || "Present")+
"<br>"+(data.notes || "");

}

else{

popupContent =
"<b>"+name+"</b><br>No wealth tax";

}

layer.bindPopup(popupContent);

}


// Load Europe map
fetch("./europe.geojson")

.then(res => res.json())

.then(function(data){

geojson = L.geoJson(data,{
style:style,
onEachFeature:onEachFeature
}).addTo(map);

});


// Legend
var legend = L.control({position:"bottomright"});

legend.onAdd = function(){

var div = L.DomUtil.create("div","legend");

div.innerHTML =
"<b>Wealth Tax Status</b><br>"+
"<i style='background:#b2182b'></i> Current<br>"+
"<i style='background:#ef8a62'></i> Former<br>"+
"<i style='background:#e0e0e0'></i> None";

return div;

};

legend.addTo(map);

</script>

</body>
</html>
